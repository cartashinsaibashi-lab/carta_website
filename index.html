<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#141138">
  <title>CARTA POKER SERIES | Tournament Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@500;600;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="wolf">

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-mark">♠</span>
        <div class="brand-text">
          <span class="brand-name">CARTA POKER SERIES</span>
          <span class="brand-sub">Official Tournament Schedule</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Category tabs / date / status filter (sticks to top while scrolling) -->
    <div class="filter-bar" id="filterBar">

    <!-- Tournament category tabs -->
    <nav class="category-tabs" id="categoryTabs" aria-label="Category">
      <button class="category-tab is-active" data-category="wolf">
        <span class="category-tab-icon icon-wolf">♠</span>Wolf
        <span class="category-tab-count" data-count="wolf">0</span>
      </button>
      <button class="category-tab" data-category="utage">
        <span class="category-tab-icon icon-utage">♥</span>Utage
        <span class="category-tab-count" data-count="utage">0</span>
      </button>
      <button class="category-tab" data-category="other">
        <span class="category-tab-icon icon-other">♦</span>Other
        <span class="category-tab-count" data-count="other">0</span>
      </button>
    </nav>

    <!-- Date selector -->
    <div class="date-strip" aria-label="Filter by date">
      <div class="month-nav" id="monthNav"></div>
      <button class="date-cell date-cell-all" id="dateAllBtn" type="button">
        <span class="date-all-label">All</span>
      </button>
      <div class="date-strip-scroll" id="dateStrip"></div>
    </div>

    <!-- Status filter (2 段構成: 上=すべて/お気に入り, 下=開催状況) -->
    <div class="status-filter" id="statusFilter" aria-label="Status filter">
      <div class="status-row status-row-top">
        <button class="status-pill is-active" data-status="all">All</button>
        <button class="status-pill fav-pill" id="favFilter" type="button"><span class="fav-pill-star">★</span>Favorites</button>
      </div>
      <div class="status-row status-row-status">
        <button class="status-pill" data-status="running"><span class="dot dot-live"></span>Live</button>
        <button class="status-pill" data-status="future"><span class="dot dot-future"></span>Upcoming</button>
        <button class="status-pill" data-status="past"><span class="dot dot-past"></span>Past</button>
      </div>
    </div>

    </div><!-- /.filter-bar -->

    <!-- Event list (cards + accordion) -->
    <section class="event-list" id="eventList"></section>

    <p class="empty-message" id="emptyMessage" hidden>No tournaments found.</p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 CARTA POKER SERIES — This page is a design mock. All data shown is dummy data.</p>
    </div>
  </footer>

  <!-- Entry modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modalBox" role="dialog" aria-modal="true" aria-label="Tournament Entry"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
